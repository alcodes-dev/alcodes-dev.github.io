<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alishan Noorani — Indie iOS Apps</title>
  <meta name="description" content="Indie iOS apps by Alishan Noorani. Currently shipping Grid Zen, a casual block puzzle for iPhone.">
  <style>
    :root {
      --bg: #1a1d2e;
      --card: #252840;
      --text: #e8eaf6;
      --muted: #9ea3c0;
      --accent: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 560px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }
    .tagline {
      color: var(--muted);
      margin: 0 0 32px;
    }
    .app {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .app h2 {
      font-size: 20px;
      margin: 0 0 4px;
    }
    .app p {
      color: var(--muted);
      margin: 0 0 12px;
    }
    .app a {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-right: 16px;
    }
    .app a:hover {
      text-decoration: underline;
    }
    footer {
      color: var(--muted);
      font-size: 14px;
      margin-top: 32px;
    }
    footer a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Alishan Noorani</h1>
    <p class="tagline">Indie iOS apps.</p>

    <section class="app">
      <h2>Grid Zen</h2>
      <p>A casual block puzzle for iPhone. Place shapes, clear lines, chase combos.</p>
      <a href="https://apps.apple.com/us/app/grid-zen/id6763410859">App Store</a>
      <a href="https://gist.github.com/alcodes-dev/b85dafd7f5591deeaf615f979dd1e201#file-privacy-policy-md">Privacy</a>
      <a href="https://gist.github.com/alcodes-dev/b85dafd7f5591deeaf615f979dd1e201#file-support-md">Support</a>
    </section>

    <footer>
      <p>Contact: <a href="mailto:alishancodes@gmail.com">alishancodes@gmail.com</a></p>
    </footer>
  </main>
</body>
</html>
